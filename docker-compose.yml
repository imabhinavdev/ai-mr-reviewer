services:
  traefik:
    container_name: ai-mr-reviewer-traefik
    image: traefik:v3.5
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    env_file: .env
    environment:
      # If you're using nginx-proxy on the server, point it at this Traefik container.
      # You'll set these in the server's env; they are optional for local dev.
      VIRTUAL_HOST: ${VIRTUAL_HOST:-}
      VIRTUAL_PORT: ${VIRTUAL_PORT:-8080}
      LETSENCRYPT_HOST: ${LETSENCRYPT_HOST:-}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
    networks:
      - nirik_bridge
      - proxy

  app:
    container_name: ai-mr-reviewer-app
    build: .
    # Expose for local dev; when using nginx-proxy in production, comment out to force traffic through proxy
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      REDIS_URL: redis://ai-mr-reviewer-redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-nirik}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nirik}
    labels:
      - traefik.enable=true
      - traefik.http.routers.ai-mr-reviewer.rule=Host(`${TRAEFIK_HOST}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`) || Path(`/`))
      - traefik.http.routers.ai-mr-reviewer.entrypoints=web
      - traefik.http.services.ai-mr-reviewer.loadbalancer.server.port=3000
    depends_on:
      traefik:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nirik_bridge

  redis:
    container_name: ai-mr-reviewer-redis
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - nirik_bridge

  postgres:
    container_name: ai-mr-reviewer-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nirik}
      POSTGRES_DB: ${POSTGRES_DB:-nirik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - nirik_bridge

networks:
  nirik_bridge:
    driver: bridge
  proxy:
    external: true

volumes:
  redis_data:
  postgres_data:
