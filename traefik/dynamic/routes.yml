# App-based routing: nginx-proxy -> Traefik:8080 -> app:3000
# No Docker provider = no Docker API version issue
http:
  routers:
    nirik:
      rule: "PathPrefix(`/api`) || PathPrefix(`/dashboard`) || Path(`/`)"
      service: nirik-app
  services:
    nirik-app:
      loadBalancer:
        servers:
          - url: "http://ai-mr-reviewer-app:3000"
        passHostHeader: true
